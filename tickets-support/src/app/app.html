
<style>
body, :host {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f6f8fc;
}
.container {
  max-width: 700px;
  margin: 2rem auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  padding: 2rem 2.5rem;
}
h1 {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}
.subtitle {
  color: #6b7280;
  margin-bottom: 1.5rem;
}
.form-row {
  display: flex;
  gap: 1rem;
  margin-bottom: 1rem;
}
.form-group {
  flex: 1;
  display: flex;
  flex-direction: column;
}
label {
  font-weight: 500;
  margin-bottom: 0.25rem;
}
input, select, textarea {
  padding: 0.5rem 0.75rem;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: 1rem;
  background: #f9fafb;
  margin-bottom: 0.5rem;
}
textarea {
  min-height: 80px;
  resize: vertical;
}
.section-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin: 1.5rem 0 0.5rem 0;
}
.submit-btn {
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 0.75rem 1.5rem;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 1rem;
  transition: background 0.2s;
}
.submit-btn:hover {
  background: #1d4ed8;
}
@media (max-width: 700px) {
  .container {
    padding: 1rem;
  }
  .form-row {
    flex-direction: column;
    gap: 0;
  }
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
}

.header-buttons {
  display: flex;
  gap: 0.5rem;
}

.header-buttons button {
  border: none;
  border-radius: 8px;
  padding: 0.5rem 1rem;
  font-weight: 600;
  cursor: pointer;
}

.btn-primary {
  background: #2563eb;
  color: white;
}

.btn-secondary {
  background: #e5e7eb;
}

.btn-danger {
  background: #fca5a5;
}
</style>


<div class="container">
<div class="header">
  <h1>Support Ticket Manager</h1>
  <div class="header-buttons">
    <button class="btn-primary">Demande Support</button>
    <button class="btn-secondary">Kanban</button>
    <button class="btn-danger">Deconnexion</button>
  </div>
</div>  <div class="subtitle">Demande client publique, espace support securise.</div>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="section-title">Vos informations</div>
    <div class="form-row">
      <div class="form-group">
        <label for="prenom">Prenom</label>
        <input id="prenom" formControlName="prenom" placeholder="Jean" />
      </div>
      <div class="form-group">
        <label for="nom">Nom</label>
        <input id="nom" formControlName="nom" placeholder="Dupont" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="telephone">Telephone</label>
        <input id="telephone" formControlName="telephone" placeholder="06 12 34 56 78" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" formControlName="email" placeholder="jean.dupont@email.com" />
      </div>
    </div>
    <div class="section-title">Votre demande</div>
    <div class="form-row">
      <div class="form-group">
        <label for="titre">Titre</label>
        <input id="titre" formControlName="titre" placeholder="Ex: Je ne peux pas me connecter" />
      </div>
      <div class="form-group">
        <label for="categorie">Categorie</label>
        <select id="categorie" formControlName="categorie">
          <option>Question generale</option>
          <option>Probleme technique</option>
          <option>Facturation</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description" placeholder="Expliquez votre probleme en detail..."></textarea>
    </div>
    <button type="submit" class="submit-btn">Envoyer la demande</button>
  </form>
</div>

<router-outlet />
